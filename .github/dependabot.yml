version: 2
updates:
- package-ecosystem: npm
  directory: /
  schedule:
    interval: weekly
    day: monday
  open-pull-requests-limit: 3
  reviewers:
  - crcapps
  labels:
  - dependencies
  - javascript
  commit-message:
    prefix: chore
    include: scope
- package-ecosystem: github-actions
  directory: /
  schedule:
    interval: monthly
  open-pull-requests-limit: 3
  reviewers:
  - crcapps
  labels:
  - dependencies
  - github-actions
